<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Cloud Carbon and Cost Report</title>
        <style>
            body { font-family: Arial, sans-serif; padding: 20px; line-height:1.6;}
            h1 { color: #2c3e50; }
            img { max-width: 100%; height: auto; margin: 20px 0;}
            table { border-collapse: collapse; width: 100%; margin-bottom: 30px;}
            th, td { border: 1px solid #ddd; padding: 8px; text-align: left;}
            th { background-color: #f2f2f2;}
            .secition { margin-top: 40px;}
        </style>
    </head>
    <body>
        <h1>Cloud Carbon and Cost Tracker Report</h1>

        <div class="section">
            <h2>Summary</h2>
            <p>{{ Summary_text }}</p>
        </div>

        {% for key, df_html in dataframes.items() %}
            <div class="section">
                <h2>{{ key}}</h2>
                {{ df_html | safe}}
            </div>
        {% endfor %}

        {% for plot in plots %}
            <div class="section">
                <h2>{{ plot.title}}</h2>
                <img src="data:image/png;base64,{{ plot.image_base64}}" alt="{{plot.title}}">
                <p>{{ plot.explanation }}</p>
            </div>
        {% endfor %}
    </body>
</html>
